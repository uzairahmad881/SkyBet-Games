<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bug Fixed Card Game</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background: radial-gradient(circle,#0f2027,#090a0f);
    color:white;
}

h1{ margin-top:20px; }

.container{
    width:600px;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

/* CARD */
.card{
    width:120px;
    height:150px;
    position:relative;
    transform-style:preserve-3d;
    transition:0.6s;
    cursor:pointer;
}

.card.flip{
    transform:rotateY(180deg);
}

/* FIX: disable clicks during animation */
.card.disabled{
    pointer-events:none;
}

.front,.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    backface-visibility:hidden;
    font-weight:bold;
}

.front{
    background:linear-gradient(135deg,#ff9800,#ff5722);
}

.back{
    background:#111;
    transform:rotateY(180deg);
}

#result{
    margin-top:20px;
    font-size:26px;
    color:#00ff88;
}

button{
    margin-top:20px;
    padding:10px 25px;
    border:none;
    border-radius:8px;
    background:red;
    color:black;
    font-weight:bold;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>🃏 Bug Fixed Card Game</h1>

<div class="container" id="box"></div>

<div id="result"></div>

<button onclick="resetGame()">RESET</button>

<script>

const box = document.getElementById("box");
const resultBox = document.getElementById("result");

let index = 0;
let locked = false;

/* 🔥 FIXED SEQUENCE */
const sequence = [
    "50",
    "0",
    "100",
    "0",
    "Better Luck Next Time",
    "0",
    "0",
    "50"
];

// CREATE CARDS
function createCards(){

    box.innerHTML="";

    sequence.forEach(()=>{

        let c=document.createElement("div");
        c.className="card";

        c.innerHTML=`
            <div class="front">CARD</div>
            <div class="back"></div>
        `;

        c.onclick=()=>pickCard(c);

        box.appendChild(c);
    });
}

createCards();

// PICK CARD (BUG FIXED)
function pickCard(card){

    if(locked) return;   // 🔥 FIX double click bug

    locked = true;
    card.classList.add("flip");

    let value = sequence[index];

    index++;
    if(index >= sequence.length){
        index = 0;
    }

    // set back value dynamically
    setTimeout(()=>{

        card.querySelector(".back").innerText = value;

        let result;

        if(value==="Better Luck Next Time"){
            result="❌ Better Luck Next Time";
        }
        else if(value==="0"){
            result="💀 Got 0";
        }
        else{
            result="🎉 Won "+value;
        }

        resultBox.innerText = result;

    },300);

    // RESET SAFE
    setTimeout(()=>{

        card.classList.remove("flip");
        resultBox.innerText="";
        locked=false;

    },2000);
}

// RESET GAME
function resetGame(){
    index = 0;
    locked = false;
    resultBox.innerText="";
    createCards();
}

</script>

</body>
</html>
